name: templateforge

services:
  postgres:
    image: postgres:16
    container_name: templateforge-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: templateforge
    ports:
      - '5432:5432'
    volumes:
      - templateforge-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d templateforge']
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  templateforge-postgres-data:
    name: templateforge-postgres-data
